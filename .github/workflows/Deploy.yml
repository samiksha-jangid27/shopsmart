name: Deploy Static HTML to EC2 (Nginx)

on:
  push:
    branches: [ "html_image" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/key.pem
          chmod 400 ~/.ssh/key.pem

      - name: Add host
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy HTML
        run: |
          scp -i ~/.ssh/key.pem image.html ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/image.html
          ssh -i ~/.ssh/key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "sudo mv /tmp/image.html /var/www/html/image.html && sudo chmod 644 /var/www/html/image.html"
