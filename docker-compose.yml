services:
  client:
    build:
      context: ./client
      dockerfile: ../docker/Dockerfile
    container_name: shopsmart-client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
    command: sh -c "npm install && npm run dev -- --host"

  server:
    build:
      context: ./server
      dockerfile: ../docker/Dockerfile
    container_name: shopsmart-server
    ports:
      - "5001:5001"
    volumes:
      - ./server:/app
    command: sh -c "npm install && npm run dev"