services:
  client:
    build:
      context: ./client
      dockerfile: ../docker/Dockerfile.client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules   # ✅ THIS LINE FIXES IT
    command: npm run dev -- --host

  server:
    build:
      context: ./server
      dockerfile: ../docker/Dockerfile.server
    container_name: shopsmart-server
    ports:
      - "5001:5001"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - PORT=5001   # ✅ ADD THIS
    command: npm run dev